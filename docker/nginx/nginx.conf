server {
    listen 80;
    listen 443 ssl;
    http2 on;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Add this line to match your PHP upload limits
    client_max_body_size 100M;
    
    server_name localhost;
    root /var/www/html/public;


    # Security headers seen in production
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Frame-Options "SAMEORIGIN";
    
    index index.php;
    charset utf-8;

    # Gzip compression for better performance
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain;
    gzip_vary on;

    # Handle Laravel localization routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /filament {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location /vendor/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Add this block for the admin panel
    location ^~ /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Add this block for Filament assets
    location ^~ /filament/assets/ {
        try_files $uri $uri/ /index.php?$query_string;
        # Add these to debug the 500 errors
        fastcgi_intercept_errors off;
        proxy_intercept_errors off;
    }

    # Special handling for Filament asset files
    location ~* ^/filament/assets/.*\.(js|css)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        try_files $uri $uri/ /index.php?$query_string;
        
        # Add debugging headers
        add_header X-Debug-Path $document_root$fastcgi_script_name;
        add_header X-Debug-URI $uri;
    }

    # Serve static assets like JS, CSS, and images
    location ~ ^/vendor/(.*)$ {
        try_files $uri /index.php?$query_string;
    }

    # Special handling for TinyMCE editor assets
    location ^~ /vendor/filament-forms-tinyeditor/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static file caching - modify to exclude admin paths
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # Don't apply caching to admin or filament paths
        if ($request_uri ~* "^/(admin|filament)/") {
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
        if ($request_uri !~* "^/(admin|filament)/") {
            expires 30d;
            access_log off;
            add_header Cache-Control "public, max-age=2592000";
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Add specific handling for JS and CSS files
    location ~* \.(js|css)$ {
        # Don't apply caching to admin or filament paths
        if ($request_uri ~* "^/(admin|filament)/") {
            expires off;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
        if ($request_uri !~* "^/(admin|filament)/") {
            expires 30d;
            add_header Cache-Control "public, max-age=3600";
        }
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP to FastCGI
    location ~ \.php$ {
        try_files $uri =404;
        # Make sure you're using the correct service name that matches docker-compose.yml
        fastcgi_pass laravel.test:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Enable these to see detailed errors
        fastcgi_intercept_errors on;
        
        # For better performance
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 600;
        
        # Keep-alive connections
        fastcgi_keep_conn on;
    }

    location ~ /\.ht {
        deny all;
    }
}