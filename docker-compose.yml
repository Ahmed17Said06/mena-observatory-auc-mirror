version: '3'
services:
    nginx:
        build:
            context: .
            dockerfile: nginx.Dockerfile
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - '.:/var/www/html'
            - 'laravel-storage:/var/www/html/storage'
        depends_on:
            - laravel.test
        networks:
            - sail

    laravel.test:
        build:
            context: ./docker/8.2
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.2/app
        environment:
            PHP_IDE_CONFIG: serverName=laravel
        volumes:
            - '.:/var/www/html'
            - 'laravel-storage:/var/www/html/storage'
            - './setup-storage.sh:/setup-storage.sh'
            - './storage/app/public:/var/www/html/host-storage:ro'  # Add this line
        networks:
            - sail
        entrypoint: ["/usr/local/bin/start-fpm-container-with-storage"]

    mysql:
        image: 'mysql:8.0' #'mysql/mysql-server:8.0'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            # MYSQL_USER: '${DB_USERNAME}'
            # MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 0
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            #- './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
            - './dump-prod_mena-202504111411.sql:/docker-entrypoint-initdb.d/01-dump.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

networks:
    sail:
        driver: bridge
volumes:
    sail-mysql:
        driver: local
    sail-redis:
        driver: local
    sail-meilisearch:
        driver: local
    laravel-storage:
        driver: local
